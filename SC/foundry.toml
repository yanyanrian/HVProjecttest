[profile.default]
src             = "src"
out             = "out"
libs            = ["lib"]
test            = "test"
script          = "script"
cache_path      = "cache"

# Compiler settings
solc_version    = "0.8.24"
optimizer       = true
optimizer_runs  = 200
via_ir          = false     # set to true for complex contracts if stack-too-deep errors arise

# EVM target — use cancun for Monad (EVM-equivalent)
evm_version     = "cancun"

# Verbosity: 0=silent, 1=errors, 2=logs, 3=traces, 4=+stack, 5=+storage
verbosity       = 2

# Remappings for OpenZeppelin Contracts 5.x
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Ignore warnings from vendored dependencies
ignored_error_codes = ["license", "unused-param"]

# Allow scripts to write deployment artifacts
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Gas snapshots (run `forge snapshot` to generate)
[profile.default.fuzz]
runs   = 500
seed   = "0xdeadbeef"

[profile.default.invariant]
runs   = 256
depth  = 15
call_override = false

# ── Monad Testnet RPC ─────────────────────────────────────────────────────────
[rpc_endpoints]
monad-testnet = "${MONAD_RPC_URL}"
localhost     = "http://127.0.0.1:8545"

# ── Etherscan / Explorer config ───────────────────────────────────────────────
[etherscan]
monad-testnet = { key = "${EXPLORER_API_KEY}", url = "https://testnet.monadexplorer.com/api?" }

# ── CI profile: more fuzz runs, stricter settings ────────────────────────────
[profile.ci]
fuzz         = { runs = 10_000 }
invariant    = { runs = 1_000, depth = 30 }
verbosity    = 3